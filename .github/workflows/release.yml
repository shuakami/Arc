name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: arc-gateway-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: arc-gateway-linux-arm64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: arc-gateway-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross compiler (linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: |
          cargo build --release -p arc-gateway --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/arc-gateway ${{ matrix.name }}

      - name: SHA256
        run: sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create SHA256SUMS
        run: cat *.sha256 > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            arc-gateway-linux-x86_64
            arc-gateway-linux-arm64
            arc-gateway-macos-arm64
            SHA256SUMS
          generate_release_notes: true
